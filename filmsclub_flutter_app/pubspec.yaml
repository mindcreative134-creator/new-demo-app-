name: filmsclub_flutter_app
description: "A premium hybrid OTT, Live TV, Sports Hub & Editorial Discovery Mobile Application"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core HTTP Client & API integration
  http: ^1.1.0
  
  # Video Playback (Supports HLS, live TV streams, and custom headers)
  video_player: ^2.8.2
  chewie: ^1.7.1
  
  # Premium UI & Image Handling
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1
  
  # State Management & Local Storage
  provider: ^6.0.5
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
